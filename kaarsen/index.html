<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaarsen</title>

    <!-- CSS -->
    <script src="https://kit.fontawesome.com/e592878f22.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/Hobby-Gallery/style.css">
    <link rel="stylesheet" href="/Hobby-Gallery/kaarsen/style.css">

    <!-- JS -->
    <!-- Load GIS client -->
    <script src="https://accounts.google.com/gsi/client" defer></script>

    <!-- Load Google API client -->
    <script src="https://apis.google.com/js/api.js" defer></script>

    <!-- General app config -->
    <script src="/Hobby-Gallery/app.js" defer></script>

    <!-- Shared Sheets service -->
    <script src="/Hobby-Gallery/sheetsService.js" defer></script>

    <script src="/Hobby-Gallery/kaarsen/dataManipulation.js" defer></script>
    <script src="/Hobby-Gallery/kaarsen/dataFetch.js" defer></script>
</head>

<body>
  <div class="grid-container">
    <nav class="navigation">
      <ul>
        <li><a href="/Hobby-Gallery/index.html">Main</a></li>
        <li><a href="/Hobby-Gallery/diamond-painting/index.html">Diamond Painting</a></li>
        <li><a href="/Hobby-Gallery/naaien/index.html">Naaien</a></li>
        <li><a href="/Hobby-Gallery/geocachen/index.html">Geocachen</a></li>
        <li><a href="/Hobby-Gallery/kaarsen/index.html">Kaarsen</a></li>
      </ul>
    </nav>

    <div id="filter-panel">

      <div class="Sorters">
          <label for="sort-attribute">Sort by:</label>
          <div id="sort-wrapper" class="sort-controls">
              
            <div class="dropdown">
                <select id="sort-attribute" class="sort-dropdown">
                  <option value="default">Default</option>
                  <option value="name">Name</option>
                  <option value="weight">Weight</option>
              </select>

              <i class="fa-solid fa-angle-down"></i>
            </div>


            <button id="sort-direction" class="direction-btn" data-order="asc">
              <i class="fa-solid fa-arrow-up"></i>
            </button>
          </div>
      </div>

    </div>
    
    <div id="display">

    </div>

<!-- Candle Modal -->
<div id="candleModal" class="modal hidden">
  <div class="modal-overlay"></div>

  <div class="modal-content">

    <!-- Close -->
    <button id="modalClose" class="modal-close">&times;</button>

    <!-- Arrows -->
    <button id="modalPrev" class="modal-arrow left">&#10094;</button>
    <button id="modalNext" class="modal-arrow right">&#10095;</button>

    <!-- Header -->
    <div class="modal-header">
      <h2 id="modalName">Candle Name</h2>
      <span id="modalId" class="modal-id">#001</span>
    </div>

    <!-- Body -->
    <div class="modal-body">

      <div class="modal-left">
        <img id="modalImg" src="" alt="">
      </div>

      <div class="modal-right">
        <!-- PRIMARY -->
        <div class="info-group">
          <div class="info-row">
            <span class="info-label">Gewicht</span>
            <span id="modalWeight" class="info-value"></span>
          </div>
        </div>

        <!-- Wick Size -->
        <div class="info-group">
          <div class="info-row">
            <span class="info-label">Lont</span>
            <span id="modalWick" class="info-value"></span>
          </div>
        </div>

        <!-- DIMENSIONS -->
        <div class="info-group">
          <div class="info-row">
            <span class="info-label">Grootte</span>
            <span id="modalDimensions" class="info-value"></span>
          </div>
        </div>

        <!-- COST -->
        <div class="info-group">
          <div class="info-row">
            <span class="info-label">Kost Materiaal</span>
            <span id="modalCost" class="info-value"></span>
          </div>
        </div>

        <!-- STOCK -->
        <div class="info-group">
          <div class="info-row">
            <span class="info-label">In Vooraad:</span>
            <span id="modalStock" class="info-value">—</span>
          </div>
        </div>

        <!-- BUTTONS -->
        <div class="modal-buttons">
          <button id="addToSession" class="primary-btn">Naar Planning</button>
          <button id="createNew" class="secondary-btn">Naar Voorraad</button>
        </div>

    </div>

      </div>
    </div>
  </div>
</div>

  </div>
</div>

  </div>


<footer> Project By Dee </footer>
</body>
</html>
