<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Painting</title>

    <!-- CSS -->
    <script src="https://kit.fontawesome.com/e592878f22.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/Hobby-Gallery/style.css">
    <link rel="stylesheet" href="/Hobby-Gallery/diamond-painting/style.css">

    <!-- JS -->
    <!-- Load GIS client -->
    <script src="https://accounts.google.com/gsi/client" defer></script>

    <!-- Load Google API client -->
    <script src="https://apis.google.com/js/api.js" defer></script>

    <!-- General app config -->
    <script src="/Hobby-Gallery/app.js" defer></script>

    <!-- Shared Sheets service -->
    <script src="/Hobby-Gallery/sheetsService.js" defer></script>

    <!-- Page-specific -->
    <script src="/Hobby-Gallery/diamond-painting/dataFetch.js" defer></script>
    <script src="/Hobby-Gallery/diamond-painting/dataManipulation.js" defer></script>
    <script src="/Hobby-Gallery/diamond-painting/dataPush.js" defer></script>
</head>

<body>

    <div class="editDPbtn">
      <i class="fa-solid fa-plus" style="color: var(--color-main-bg);"></i>
    </div>

    <div class="grid-container">
    <nav class="navigation">
      <ul>
        <li><a href="/Hobby-Gallery/index.html">Main</a></li>
        <li><a href="/Hobby-Gallery/diamond-painting/index.html">Diamond Painting</a></li>
        <li><a href="/Hobby-Gallery/naaien/index.html">Naaien</a></li>
        <li><a href="/Hobby-Gallery/geocachen/index.html">Geocachen</a></li>
        <li><a href="/Hobby-Gallery/kaarsen/index.html">Kaarsen</a></li>
      </ul>
    </nav>
      
    <div id="filter-panel">

      <label class="filterlbl">Show all info
          <input type="checkbox" id="infoToggle">
          <span class="toggle-info" title="Press to display all info cards!"></span>
      </label>

      <label class="filterlbl">Image State Toggle</label>
      <div class="SwapPicBtn">
          <button id="btnBefore">Show Before</button>
          <button id="btnDefault">Default</button>
          <button id="btnAfter">Show After</button>
      </div>

      <label class="filterlbl">Completeness Filter</label>
      <div class="ToggleStateBtn">
          <button id="btnUnFinished">WIP</button>
          <button id="btnAll">Show All</button>
          <button id="btnFinished">Complete</button>
      </div>

      <label class="filterlbl">Filter by Owner</label>
        <div class="nameFilter">
          <input type="text" class="nameFilter-input" placeholder="Select owner..." autocomplete="off">
          <ul class="nameFilter-list hidden"></ul>
        </div>

      <div class="modifierFilters">
        <div id="filterAB" class="modifier">AB</div>
        <div id="filterFD" class="modifier">FD</div>
      </div>

    </div>

    <div id="display">

    </div>
    </div>

<div id="dp-modal" class="dp-modal hidden">

  <div class="dp-modal-box">

    <div class="dp-modal-header">
      <button onclick="closeModal()">✖</button>
    </div>

    <div class="dp-mode">
      <button onclick="showAdd()">➕ Add</button>
      <button onclick="showEditSelect()">✏️ Edit</button>
    </div>

    <div id="dp-add" class="dp-section hidden">

      <h2>Add Painting</h2>

      <input id="add_name" placeholder="Name">
      <input id="add_width" type="number" placeholder="Width">
      <input id="add_height" type="number" placeholder="Height">

      <div class="ownerFilter">
        <input type="text" id="owner_input" class="ownerFilter-input" placeholder="Owner..." autocomplete="off">
        <ul id="owner_list" class="ownerFilter-list hidden"></ul>
      </div>

      <input id="add_comment" placeholder="Comment">
      <input id="add_imgoriginal" placeholder="Original Image URL">
      <input id="add_imgfinished" placeholder="Finished Image URL">

      <div class="abfdGroup">
      <div class="neonToggle">
          <input id="add_ab" type="checkbox">
          <label for="add_ab">AB</label>
      </div>
      </div>

      <div class="neonToggle">
          <input id="add_fd" type="checkbox">
          <label for="add_fd">FD</label>
      </div>

      <button onclick="paintingAdd()">Save</button>
    </div>

    <div id="dp-edit-select" class="dp-section hidden">

      <h2>Edit Painting</h2>

    <select id="edit_select_dropdown">
      <option value="">Select a painting...</option>
    </select>

    <button onclick="loadPainting()">Load</button>

    </div>

    <div id="dp-edit" class="dp-section hidden">

      <h2>Edit Painting</h2>

      <input id="edit_name" placeholder="Name">
      <input id="edit_width" type="number" placeholder="Width">
      <input id="edit_height" type="number" placeholder="Height">

      <div class="ownerFilter">
        <input type="text" id="edit_owner_input" class="ownerFilter-input" placeholder="Owner..." autocomplete="off">
        <ul id="edit_owner_list" class="ownerFilter-list hidden"></ul>
      </div>

      <input id="edit_comment" placeholder="Comment">
      <input id="edit_imgoriginal" placeholder="Original Image URL">
      <input id="edit_imgfinished" placeholder="Finished Image URL">

      <div class="abfdGroup">
      <div class="neonToggle">
          <input id="edit_ab" type="checkbox">
          <label for="edit_ab">AB</label>
      </div>
      </div>

      <div class="neonToggle">
          <input id="edit_fd" type="checkbox">
          <label for="edit_fd">FD</label>
      </div>

      <button onclick="paintingEdit()">Save Changes</button>

    </div>

  </div>
</div>

<div id="toast" class="toast hidden"></div>

</body>

<footer> Project By Dee </footer>
</html>
